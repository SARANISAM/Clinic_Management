<!DOCTYPE html>
<html>

<head>
    <title>Patients</title>
    <link rel="stylesheet" href="stylep.css.css">
    <style>
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .modal-content {
            background-color: #112b44;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 50%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #1e90ff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            border-bottom: 2px solid #1e90ff;
            padding-bottom: 10px;
            margin-top: 0;
            color: #4db8ff;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #fff;
        }

        .history-item {
            border-bottom: 1px solid #12395c;
            padding: 10px 0;
        }

        .history-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Doctor Panel</h2>
        <a href="doctordashboard.html">Dashboard</a>
        <a href="doctorappointment.html">Appointment</a>
        <a href="doctorpatients.html">Patients</a>
        <a href="addtreatment.html">Add Treatment</a>
        <a href="editprofile.html">Edit Profile</a>
    </div>

    <div class="main">
        <h1>Patient List</h1>

        <div class="card">
            <p><strong>Name:</strong> Rahul</p>
            <p><strong>Age:</strong> 25</p>
            <p><strong>Gender:</strong> Male</p>
            <button onclick="viewHistory('Rahul')">View History</button>
        </div>

        <!-- Patient History Modal -->
        <div id="historyModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalPatientName">Patient History</h2>
                <div id="historyList">
                    <!-- History items will be inserted here -->
                </div>
            </div>
        </div>

    </div>
    
</body>

</html>
